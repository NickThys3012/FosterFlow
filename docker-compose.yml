services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: fosterflow-api
    container_name: fosterflow-api
    ports:
      - "${API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Database: "Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__BlobStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://blobstorage:10000/devstoreaccount1;QueueEndpoint=http://blobstorage:10001/devstoreaccount1;TableEndpoint=http://blobstorage:10002/devstoreaccount1"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      # Stream structured logs to the Loki service (US-INF-4.2, #48).
      Loki__Url: "http://loki:3100"
      Loki__Environment: "development"
    depends_on:
      sqlserver:
        condition: service_healthy
      blobstorage:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # One-off service that applies EF Core migrations via the bundled executable,
  # then exits. Keeps schema management out of the API's startup code.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    image: fosterflow-migrator
    container_name: fosterflow-migrator
    environment:
      ConnectionStrings__Database: "Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: fosterflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    # Expose 1433 to the host only if it is free. Commented out by default to
    # avoid clashing with a locally installed SQL Server. The api container
    # reaches the database over the internal compose network regardless.
    # ports:
    #   - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  blobstorage:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: fosterflow-azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    restart: unless-stopped

  # ── Monitoring stack (US-INF-4.1/4.2/4.3 — #47 #48 #49) ──────────────
  # Prometheus scrapes the API's /metrics endpoint; Loki ingests Serilog
  # structured logs; Grafana visualises both via provisioned dashboards.
  prometheus:
    image: prom/prometheus:latest
    container_name: fosterflow-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: fosterflow-loki
    command: "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fosterflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  sqlserver-data:
  azurite-data:
  prometheus-data:
  loki-data:
  grafana-data:
