# Prometheus scrape configuration for the Azure (App Service) deployment.
# Used by the ACI monitoring container group (infra/modules/monitoring.bicep).
# Upload to the Azure Files share with infra/upload-monitoring-config.sh.
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: fosterflow

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: fosterflow-api
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['__API_HOST__']
        labels:
          app: fosterflow-api
          environment: production
