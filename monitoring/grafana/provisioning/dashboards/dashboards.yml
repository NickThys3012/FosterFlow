# Grafana dashboard provisioning (US-INF-4.3, #49).
apiVersion: 1

providers:
  - name: FosterFlow
    orgId: 1
    folder: FosterFlow
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
